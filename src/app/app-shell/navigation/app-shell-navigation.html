<aside id="primary-navigation">
  <nav aria-label="Primary navigation">
    <p class="navigation-label mat-label-medium">Workspace</p>
    <mat-nav-list>
      @for (item of items(); track item.anchor) {
        <a mat-list-item [href]="item.anchor">
          <mat-icon matListItemIcon [fontIcon]="item.icon" />
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </nav>
</aside>
