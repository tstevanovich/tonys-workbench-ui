<section
  class="workspace-page"
  aria-labelledby="workspace-page-title"
  [attr.data-workspace-page]="page().eyebrow">
  <header class="workspace-header">
    <p class="eyebrow mat-label-large">{{ page().eyebrow }}</p>
    <h1 id="workspace-page-title">{{ page().title }}</h1>
    <p class="mat-body-large">{{ page().summary }}</p>
  </header>

  <section class="capability-grid" aria-label="Workspace capabilities">
    @for (capability of page().capabilities; track capability.title) {
      <mat-card appearance="outlined">
        <div class="capability-card-header">
          <mat-icon class="capability-icon" [fontIcon]="capability.icon" />
          <div class="capability-heading">
            <h2>{{ capability.title }}</h2>
            <p>{{ page().title }}</p>
          </div>
        </div>
        <mat-card-content>
          <p>{{ capability.description }}</p>
        </mat-card-content>
      </mat-card>
    }
  </section>
</section>
