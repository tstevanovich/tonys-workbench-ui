<div class="app-shell" [class.navigation-compact]="!navigationExpanded()">
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <app-shell-header
    [activeTheme]="themeService.activeTheme()"
    [themes]="themeService.themes"
    [navigationExpanded]="navigationExpanded()"
    (navigationToggled)="toggleNavigation()"
    (themeSelected)="selectTheme($event)" />

  <app-shell-navigation
    [items]="navigationItems"
    [expanded]="navigationExpanded()"
    (modeToggled)="toggleNavigation()"
    (linkActivated)="compactNavigation()" />

  <main id="main-content" class="shell-content" tabindex="-1">
    <router-outlet />
  </main>

  <app-shell-footer />
</div>
