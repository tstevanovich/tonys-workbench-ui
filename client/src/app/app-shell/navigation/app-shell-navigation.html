<aside id="primary-navigation" [class.compact-navigation]="!expanded()">
  <nav aria-label="Primary navigation">
    <div class="navigation-header">
      <p class="navigation-label mat-label-medium">Workspace</p>
      <button
        matIconButton
        type="button"
        class="navigation-mode-toggle"
        [attr.aria-label]="expanded() ? 'Compact navigation' : 'Expand navigation'"
        [title]="expanded() ? 'Compact navigation' : 'Expand navigation'"
        (click)="modeToggled.emit()">
        <mat-icon
          [fontIcon]="expanded() ? 'keyboard_double_arrow_left' : 'keyboard_double_arrow_right'" />
      </button>
    </div>

    <div class="navigation-list">
      @for (item of items(); track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active-navigation-item"
          [routerLinkActiveOptions]="{ exact: item.route === '/' }"
          [attr.aria-label]="item.label"
          [title]="item.label"
          (click)="linkActivated.emit()">
          <mat-icon [fontIcon]="item.icon" />
          <span>{{ item.label }}</span>
        </a>
      }
    </div>
  </nav>
</aside>
