<header>
  <mat-toolbar>
    <button
      matIconButton
      type="button"
      class="navigation-toggle"
      [attr.aria-expanded]="navigationExpanded()"
      aria-controls="primary-navigation"
      [attr.aria-label]="navigationExpanded() ? 'Compact navigation' : 'Expand navigation'"
      [title]="navigationExpanded() ? 'Compact navigation' : 'Expand navigation'"
      (click)="navigationToggled.emit()">
      <mat-icon fontIcon="menu" />
    </button>
    <a class="brand" routerLink="/" aria-label="Tony's Workbench home">
      <img
        ngSrc="/brand/tonys-workbench-logo.png"
        width="36"
        height="36"
        alt=""
        aria-hidden="true"
        priority />
      <span>Tony's Workbench</span>
    </a>
    <span class="toolbar-spacer"></span>
    <button matIconButton type="button" aria-label="Search" title="Search">
      <mat-icon fontIcon="search" />
    </button>
    <a
      matIconButton
      [href]="repositoryUrl"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Open GitHub repository"
      title="GitHub repository">
      <mat-icon fontIcon="code" />
    </a>
    <button
      matIconButton
      type="button"
      class="theme-toggle"
      [matMenuTriggerFor]="themeMenu"
      [attr.aria-label]="'Current theme: ' + activeTheme().label + '. Open theme menu'"
      [title]="'Current theme: ' + activeTheme().label">
      <mat-icon fontIcon="palette" />
    </button>
    <mat-menu #themeMenu="matMenu" xPosition="before">
      @for (theme of themes(); track theme.id) {
        <button
          mat-menu-item
          type="button"
          class="theme-menu-item"
          [class.theme-menu-item-active]="theme.id === activeTheme().id"
          [attr.aria-current]="theme.id === activeTheme().id ? 'true' : null"
          (click)="themeSelected.emit(theme.id)">
          <span class="theme-menu-row">
            <span class="theme-menu-radio material-symbols-outlined" aria-hidden="true">
              {{
                theme.id === activeTheme().id ? 'radio_button_checked' : 'radio_button_unchecked'
              }}
            </span>
            <span class="theme-menu-label">{{ theme.label }}</span>
            <span
              class="theme-menu-theme-icon material-symbols-outlined"
              aria-hidden="true"
              [style.color]="theme.swatch">
              {{ theme.icon }}
            </span>
          </span>
        </button>
      }
    </mat-menu>
    <button matButton="outlined" type="button">
      <mat-icon fontIcon="account_circle" />
      Sign in
    </button>
  </mat-toolbar>
</header>
