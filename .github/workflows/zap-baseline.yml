name: OWASP ZAP Baseline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * 1'

permissions:
  contents: read
  issues: write

jobs:
  zap:
    runs-on: ubuntu-latest
    steps:
      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ vars.PUBLIC_APP_URL }}
          fail_action: false
